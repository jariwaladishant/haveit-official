<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Have It</title>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet" />
  <style>
    html,
    body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      overflow: hidden;
      background: #121212;
    }

    .bg-blur,
    .main-image-container {
      display: none;
    }

    .hero-bg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: url('have-it-back.png') center center / cover no-repeat;
      z-index: 0;
    }

    .info-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      min-width: 100vw;
      background: rgba(255, 255, 255, 0);
      backdrop-filter: blur(8px);
      border-radius: 0 0 32px 32px;
      padding: 18px 0;
      font-family: 'Luckiest Guy', cursive;
      font-weight: 400;
      font-size: 1.8rem;
      text-align: center;
      color: #ff6f00;
      /* pop orange */
      letter-spacing: 2px;

      /* layered shadow drop */
      text-shadow:
        2px 2px 0 #000000,
        4px 4px 0 #000000,
        6px 6px 5px rgba(0, 0, 0, 0.4);

      box-shadow: 0 4px 10px rgba(255, 102, 0, 0.4);
      z-index: 2;
      white-space: nowrap;
      overflow-x: auto;
      text-overflow: ellipsis;

      /* continuous pulse animation */
      animation: pulsePop 2.5s ease-in-out infinite;
      transform-origin: center top;
    }

    @keyframes pulsePop {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.12);
      }
    }

    /* Mobile styles: show sharp, centered image + blurred edges */
    @media (max-width: 900px) {
      .hero-bg {
        display: none;
      }

      .bg-blur {
        display: block;
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        filter: blur(26px) brightness(1.08);
        z-index: 0;
        pointer-events: none;
      }

      .main-image-container {
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        align-items: center;
        justify-content: center;
        z-index: 1;
        pointer-events: none;
      }

      .main-image {
        max-width: 100vw;
        max-height: 100vh;
        width: auto;
        height: auto;
        object-fit: contain;
        display: block;
        box-shadow: 0 0 60px 0 rgba(0, 0, 0, 0.04);
      }
    }
  </style>
</head>

<body>
  <!-- Desktop background image -->
  <div class="hero-bg"></div>
  <!-- Mobile blurred fill for borders -->
  <img src="have-it-back.png" alt="Blurred background" class="bg-blur" />
  <!-- Mobile centered sharp image -->
  <div class="main-image-container">
    <img src="have-it-back.png" alt="Launching Soon" class="main-image" />
  </div>
  <!-- Info block -->
  <div class="info-top">
    Loading Something Yummier 😋<br>Stay Tuned 🍫
  </div>
</body>

</html>
