<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launching Soon | Have It</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
    }
    .container {
      max-width: 600px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 20px;
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }
    .email-box {
      margin-top: 20px;
    }
    input[type="email"] {
      padding: 10px;
      border: none;
      border-radius: 5px;
      width: 70%;
      max-width: 300px;
    }
    button {
      padding: 10px 20px;
      margin-left: 10px;
      border: none;
      border-radius: 5px;
      background-color: #fff;
      color: #2575fc;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background-color: #f1f1f1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">HAVE IT</div>
    <p>Because You Can</p>
    <h1>Launching Soon 🚀</h1>
    <p>Stay tuned for something exciting!</p>
    <div class="email-box">
      <input type="email" placeholder="Enter your email">
      <button>Notify Me</button>
    </div>
  </div>
</body>
</html>
