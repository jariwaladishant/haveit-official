<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Have It</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Pacifico&display=swap"
    rel="stylesheet" />
  <style>
    html,
    body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      overflow: hidden;
      background: #121212;
      color: #ba00ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hero-bg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg,
          rgba(186, 0, 255, 0.6),
          rgba(124, 50, 212, 0.6)),
        url('have-it-back.png') center center / cover no-repeat;
      z-index: 0;
      filter: brightness(0.8);
      transition: background 0.5s ease;
    }

    .info-top {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 16px 28px;
      text-align: center;
      font-family: "Georgia", serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 1.3px;
      box-shadow: 0 5px 15px rgba(186, 0, 255, 0.4);
      color: #ffccff;
      text-shadow: 1px 1px 3px rgba(124, 50, 212, 0.9);
      user-select: none;
      max-width: 90vw;
      animation: fadeInDown 1.5s ease forwards;
    }

    @keyframes fadeInDown {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px);
      }

      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }


    .pulse {
      display: inline-block;
      animation: pulseAnim 2.5s infinite;
    }

    @keyframes pulseAnim {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.1);
        opacity: 0.8;
      }
    }

    /* Mobile styles: show sharp, centered image + blurred edges */
    @media (max-width: 900px) {
      .hero-bg {
        display: none;
      }

      .bg-blur {
        display: block;
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        filter: blur(26px) brightness(1.08);
        z-index: 0;
        pointer-events: none;
      }

      .main-image-container {
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        align-items: center;
        justify-content: center;
        z-index: 1;
        pointer-events: none;
      }

      .main-image {
        max-width: 100vw;
        max-height: 100vh;
        width: auto;
        height: auto;
        object-fit: contain;
        display: block;
        box-shadow: 0 0 60px 0 rgba(0, 0, 0, 0.04);
      }

      .info-top {
        max-width: 100vw;
        min-width: 100vw;
        font-size: 1.4rem;
        font-weight: 700;
        padding: 14px 0;
      }
    }
  </style>
</head>

<body>
  <!-- Desktop background image with gradient overlay -->
  <div class="hero-bg"></div>
  <!-- Mobile blurred fill for borders -->
  <img src="have-it-back.png" alt="Blurred background" class="bg-blur" />
  <!-- Mobile centered sharp image -->
  <div class="main-image-container">
    <img src="have-it-back.png" alt="Launching Soon" class="main-image" />
  </div>
  <!-- Info block with pulse sparkle -->
  <div class="info-top">
    <span class="pulse">Loading Something Yummier 😋<br>Stay Tuned 🍫</span>
  </div>
</body>

</html>
