<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Have It</title>
  <style>
    html,
    body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      overflow: hidden;
      background: #121212;
    }

    .bg-blur,
    .main-image-container {
      display: none;
    }

    .hero-bg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: url('have-it-back.png') center center / cover no-repeat;
      z-index: 0;
    }

    .info-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      min-width: 100vw;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 0 0 32px 32px;
      padding: 18px 0;
      text-align: center;
      font-family: Georgia, serif;
      color: #ba00ff;
      /* purple */
      box-shadow: 0 2px 6px rgba(240, 120, 30, 0.15);
      z-index: 2;
      letter-spacing: 1.3px;
      text-shadow: 1px 1px 2px rgba(124, 50, 212, 0.2);
      /* subtle purple shadow */
      white-space: nowrap;
      overflow-x: auto;
      text-overflow: ellipsis;
    }


    /* Mobile styles: show sharp, centered image + blurred edges */
    @media (max-width: 900px) {
      .hero-bg {
        display: none;
      }

      .bg-blur {
        display: block;
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        filter: blur(26px) brightness(1.08);
        z-index: 0;
        pointer-events: none;
      }

      .main-image-container {
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        align-items: center;
        justify-content: center;
        z-index: 1;
        pointer-events: none;
      }

      .main-image {
        max-width: 100vw;
        max-height: 100vh;
        width: auto;
        height: auto;
        object-fit: contain;
        display: block;
        box-shadow: 0 0 60px 0 rgba(0, 0, 0, 0.04);
      }

      .info-top {
        max-width: 100vw;
        min-width: 100vw;
        font-size: 1.2rem;
        font-weight: bolder;
        padding: 10px 0;
      }
    }
  </style>
</head>

<body>
  <!-- Desktop background image -->
  <div class="hero-bg"></div>
  <!-- Mobile blurred fill for borders -->
  <img src="have-it-back.png" alt="Blurred background" class="bg-blur" />
  <!-- Mobile centered sharp image -->
  <div class="main-image-container">
    <img src="have-it-back.png" alt="Launching Soon" class="main-image" />
  </div>
  <!-- Info block -->
  <div class="info-top">
    Loading Something Yummier 😋<br>Stay Tuned 🍫
  </div>
</body>

</html>
